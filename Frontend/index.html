<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mineral Water Management</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #f5f7fa;
        color: #1e2329;
        font-size: 14px;
        line-height: 1.6;
      }
      .container {
        max-width: 1140px;
        margin: 0 auto;
        padding: 28px 24px;
      }
      .card {
        background: #fff;
        border-radius: 10px;
        border: 1px solid #e8eaed;
        padding: 20px 24px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 18px;
        border-radius: 7px;
        border: none;
        cursor: pointer;
        font-size: 13.5px;
        font-weight: 500;
        transition: filter 0.15s;
        white-space: nowrap;
      }
      .btn:hover {
        filter: brightness(0.92);
      }
      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
      .btn-primary {
        background: #1a73e8;
        color: #fff;
      }
      .btn-success {
        background: #34a853;
        color: #fff;
      }
      .btn-danger {
        background: #ea4335;
        color: #fff;
      }
      .btn-secondary {
        background: #f1f3f4;
        color: #3c4043;
        border: 1px solid #dadce0;
      }
      .btn-sm {
        padding: 5px 11px;
        font-size: 12.5px;
        border-radius: 6px;
      }
      .badge {
        display: inline-block;
        padding: 2px 10px;
        border-radius: 12px;
        font-size: 12px;
        font-weight: 500;
      }
      .badge-ok {
        background: #e6f4ea;
        color: #137333;
      }
      .badge-warning {
        background: #fef9e7;
        color: #b06000;
      }
      .badge-danger {
        background: #fce8e6;
        color: #c5221f;
      }
      .badge-info {
        background: #e8f0fe;
        color: #1558d6;
      }
      .badge-admin {
        background: #fce8e6;
        color: #c5221f;
      }
      .badge-user {
        background: #e6f4ea;
        color: #137333;
      }
      /* Order status — backend lưu int: 0=Pending,1=Confirmed,2=Shipped,3=Delivered,4=Cancelled */
      .badge-0 {
        background: #fef9e7;
        color: #b06000;
      }
      .badge-1 {
        background: #e8f0fe;
        color: #1558d6;
      }
      .badge-2 {
        background: #e6f4ea;
        color: #137333;
      }
      .badge-3 {
        background: #d1e7dd;
        color: #0f5132;
      }
      .badge-4 {
        background: #fce8e6;
        color: #c5221f;
      }
      .table-wrap {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        font-size: 13.5px;
      }
      thead th {
        text-align: left;
        padding: 10px 14px;
        background: #f8f9fa;
        border-bottom: 2px solid #e8eaed;
        font-weight: 600;
        color: #5f6368;
        font-size: 12.5px;
      }
      tbody td {
        padding: 11px 14px;
        border-bottom: 1px solid #f0f2f5;
        vertical-align: middle;
      }
      tbody tr:last-child td {
        border-bottom: none;
      }
      tbody tr:hover td {
        background: #f8f9fa;
      }
      tfoot td {
        padding: 11px 14px;
        font-weight: 600;
        border-top: 2px solid #e8eaed;
      }
      .form-group {
        margin-bottom: 16px;
      }
      .form-group label {
        display: block;
        font-size: 13px;
        font-weight: 500;
        color: #5f6368;
        margin-bottom: 6px;
      }
      .form-control {
        width: 100%;
        padding: 9px 12px;
        border: 1px solid #dadce0;
        border-radius: 7px;
        font-size: 14px;
        outline: none;
        background: #fff;
        transition: border-color 0.15s;
        color: #1e2329;
      }
      .form-control:focus {
        border-color: #1a73e8;
        box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.12);
      }
      select.form-control {
        cursor: pointer;
      }
      .page-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 20px;
      }
      .page-header h1 {
        font-size: 20px;
        font-weight: 600;
      }
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(32, 33, 36, 0.45);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 300;
      }
      .modal {
        background: #fff;
        border-radius: 12px;
        padding: 28px 32px;
        width: 500px;
        max-width: 95vw;
        max-height: 90vh;
        overflow-y: auto;
      }
      .modal-title {
        font-size: 17px;
        font-weight: 600;
        margin-bottom: 22px;
        padding-bottom: 14px;
        border-bottom: 1px solid #f0f2f5;
      }
      .modal-footer {
        display: flex;
        justify-content: flex-end;
        gap: 10px;
        margin-top: 24px;
        padding-top: 16px;
        border-top: 1px solid #f0f2f5;
      }
      .alert {
        padding: 10px 14px;
        border-radius: 7px;
        font-size: 13.5px;
        margin-bottom: 14px;
      }
      .alert-error {
        background: #fce8e6;
        color: #c5221f;
        border: 1px solid #f5c6c2;
      }
      .alert-info {
        background: #e8f0fe;
        color: #1558d6;
        border: 1px solid #c5d8fd;
      }
      .loading-text {
        text-align: center;
        padding: 48px;
        color: #9aa0a6;
      }
      .grid-2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
